version: 1
send_anonymous_usage_stats: true
project_id: tap-postgres
plugins:
  extractors:
  - name: tap-postgres
    namespace: tap_postgres
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    settings:
    - name: sqlalchemy_url
      kind: password
      sensitive: true
    - name: stream_options
      kind: object
    - name: ssh_tunnel.enable
      kind: boolean
      value: false
    - name: ssh_tunnel.private_key
      kind: password
      sensitive: true
    - name: ssh_tunnel.private_key_password
      kind: password
      sensitive: true
    - name: ssh_tunnel.host
    - name: ssh_tunnel.username
    - name: ssh_tunnel.port
    - name: ssl_enable
      kind: boolean
    - name: ssl_client_certificate_enable
      kind: boolean
    - name: ssl_mode
    - name: ssl_certificate_authority
      kind: password
      sensitive: true
    - name: ssl_client_certificate
      kind: password
      sensitive: true
    - name: ssl_client_private_key
      kind: password
      sensitive: true
    - name: replication_max_run_seconds
      kind: integer
      description: Max seconds the LOG_BASED replication loop will run before exiting (default 600).
    - name: replication_idle_exit_seconds
      kind: integer
      description: Exit LOG_BASED replication if no data messages arrive for this many seconds (default 60).
    config:
      sqlalchemy_url: postgresql://postgres:postgres@localhost:5432/postgres
    select:
    - "*.*"
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
venv:
  backend: uv
